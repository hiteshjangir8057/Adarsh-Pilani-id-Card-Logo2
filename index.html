
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master I-Card Pro - Full Features Restored</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Roboto:wght@400;700&family=Montserrat:wght@400;800&family=Open+Sans:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <style id="dynamic-styles">
        :root {
            --primary: #1e3a8a;
            --accent: #b45309;
            --card-border: #1e293b;
            --card-text: #1e293b;
            --badge-bg: #1e3a8a;
            --badge-text: #ffffff;
            --footer-bg: #f8fafc;
            --card-font-family: 'Poppins', sans-serif;
            --sidebar-bg: #0f172a;
            --card-w: 95mm;
            --card-h: 62mm;
            --school-font-size: 11px;
            --page-margin: 10mm;
            --page-w: 210mm;
            --page-h: 297mm;

            /* Image Movement Variables */
            --boy-size: 125px; --boy-top: 12px; --boy-right: 5px;
            --girl-size: 125px; --girl-top: 12px; --girl-right: 5px;
        }

        /* --- PRINT CSS --- */
        @media print {
            @page { size: A4; margin: 0 !important; }
            body { background: white !important; margin: 0 !important; padding: 0 !important; }
            .sidebar, .excel-view, .home-link, .print-container, .card-tools { display: none !important; }
            .viewport { display: block !important; overflow: visible !important; }
            .preview-area { padding: 0 !important; margin: 0 !important; width: 100% !important; display: block !important; overflow: visible !important; }
            .a4-page { box-shadow: none !important; margin: 0 !important; border: none !important; page-break-after: always !important; display: grid !important; }
            .img-container.hidden { display: none !important; }
        }

        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background-color: #cbd5e1; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 350px; background: var(--sidebar-bg); color: white; padding: 15px; height: 100vh; overflow-y: auto;
            box-shadow: 4px 0 10px rgba(0,0,0,0.3); flex-shrink: 0; z-index: 2000; padding-bottom: 120px; box-sizing: border-box;
        }
        .sidebar h2 { font-size: 14px; color: #fbbf24; border-bottom: 1px solid #334155; padding-bottom: 8px; margin-bottom: 15px; text-transform: uppercase; }
        .control-panel { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #334155; }
        .control-panel label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 5px; margin-top: 10px; }
        .section-title { font-size: 12px; color: #fbbf24; font-weight: bold; border-bottom: 1px solid #334155; padding-bottom: 4px; margin-bottom: 8px; display: block; }
        input, select { width: 100%; padding: 8px; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 4px; font-size: 12px; }

        /* --- LAYOUT --- */
        .viewport { flex-grow: 1; display: flex; height: 100vh; overflow: hidden; }
        .preview-area { flex: 2.5; padding: 40px 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; border-right: 2px solid #94a3b8; }
        .a4-page { width: var(--page-w); min-height: var(--page-h); background: white; margin-bottom: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); padding: var(--page-margin); box-sizing: border-box; display: grid; grid-template-columns: repeat(2, var(--card-w)); gap: 4mm 6mm; justify-content: center; align-content: start; }

        .excel-view { flex: 1.2; background: #f8fafc; padding: 15px; overflow: auto; border-left: 1px solid #cbd5e1; }
        .excel-view h3 { font-size: 14px; color: #1e293b; margin-top: 0; border-bottom: 2px solid #cbd5e1; padding-bottom: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; background: white; }
        th { background: #1e293b; color: white; padding: 8px; position: sticky; top: 0; }
        td { border: 1px solid #cbd5e1; padding: 6px; text-align: left; }
        tr:nth-child(even) { background: #f1f5f9; }

        /* --- CARD DESIGN --- */
        .card { width: var(--card-w); height: var(--card-h); background: white; border-radius: 10px; border: 2.5px solid var(--card-border); position: relative; overflow: hidden; box-sizing: border-box; }
        .card-tools { position: absolute; top: 2px; right: 2px; z-index: 100; opacity: 0; transition: 0.3s; }
        .card:hover .card-tools { opacity: 1; }
        .tool-btn { background: rgba(239, 68, 68, 0.9); color: white; border: none; width: 22px; height: 22px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .header { height: 70px; background: white; display: flex; align-items: center; padding: 0 10px; border-bottom: 3px solid var(--primary); }
        .img-container { cursor: pointer; }
        .img-container.hidden img { opacity: 0; visibility: hidden; }
        .school-logo-img { width: 55px; height: 55px; object-fit: contain; pointer-events: none; }
        .header-text { flex-grow: 1; text-align: center; }
        .school-name { font-weight: 800; color: var(--primary); margin: 0; text-transform: uppercase; line-height: 1.2; font-size: var(--school-font-size); }
        .city-name { font-size: 18px; font-weight: 800; color: var(--accent); margin: 0; letter-spacing: 4px; line-height: 1;}

        .body-content { padding: 10px 15px; position: relative; height: 100px; }
        .pass-badge { display: inline-block; background: var(--badge-bg); color: var(--badge-text); padding: 2px 18px; border-radius: 50px; font-size: 11px; font-weight: 600; margin-bottom: 5px; position: relative; left: 50%; transform: translateX(-50%); }
        .details { position: relative; z-index: 10; font-size: 20px; font-weight: 700; color: var(--card-text); line-height: 1.6; padding-right: 90px; }
        .label { color: #64748b; font-size: 13px; width: 80px; display: inline-block; font-weight: 600; }

        .char-container { position: absolute; z-index: 15; cursor: pointer; }
        .character-img { mix-blend-mode: multiply; pointer-events: none; }
        .boy-box { height: var(--boy-size); top: var(--boy-top); right: var(--boy-right); }
        .girl-box { height: var(--girl-size); top: var(--girl-top); right: var(--girl-right); }
        .boy-box img, .girl-box img { height: 100%; }

        .footer { position: absolute; bottom: 0; width: 100%; height: 50px; background: var(--footer-bg); border-top: 1px dashed #cbd5e1; display: flex; justify-content: space-between; align-items: flex-end; padding: 0 15px 8px 15px; box-sizing: border-box; }
        .footer span { font-weight: 800; font-size: 14px; color: var(--primary); }

        .print-container { position: fixed; bottom: 0; left: 0; width: 350px; padding: 20px; background: var(--sidebar-bg); border-top: 1px solid #334155; z-index: 3000; }
        .print-btn { width: 100%; padding: 15px; background: #22c55e; color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); }
        .home-link { position: fixed; top: 15px; left: 55%; transform: translateX(-50%); z-index: 5000; text-decoration: none; }
        .hitesh-btn { background: #fbbf24; color: #000; padding: 8px 20px; border-radius: 50px; font-weight: 800; font-size: 12px; border: 2px solid white; }
    </style>
</head>
<body>

    <a href="https://hiteshdesk.blogspot.com" target="_blank" class="home-link">
        <div class="hitesh-btn">🏠 HiteshDesk Home</div>
    </a>

    <div class="sidebar">
        <h2>I-Card Designer Pro</h2>
        
        <div class="control-panel">
            <span class="section-title">1. Card & Page Settings</span>
            <label>Card Width / Height (mm):</label>
            <input type="range" id="card_w_slider" min="85" max="105" value="95" oninput="updateStyle()">
            <input type="range" id="card_h_slider" min="55" max="75" value="62" oninput="updateStyle()">
            <label>School Name Size / Page Margin:</label>
            <input type="range" id="font_slider" min="8" max="25" value="11" oninput="updateStyle()">
            <input type="range" id="page_margin_slider" min="0" max="30" value="10" oninput="updateStyle()">
        </div>

        <div class="control-panel">
            <span class="section-title">2. Boy Movement Control</span>
            <label>Size / Top / Right:</label>
            <input type="range" id="boy_size" min="50" max="200" value="125" oninput="updateStyle()">
            <input type="range" id="boy_top" min="-50" max="100" value="12" oninput="updateStyle()">
            <input type="range" id="boy_right" min="-50" max="100" value="5" oninput="updateStyle()">
        </div>

        <div class="control-panel">
            <span class="section-title">3. Girl Movement Control</span>
            <label>Size / Top / Right:</label>
            <input type="range" id="girl_size" min="50" max="200" value="125" oninput="updateStyle()">
            <input type="range" id="girl_top" min="-50" max="100" value="12" oninput="updateStyle()">
            <input type="range" id="girl_right" min="-50" max="100" value="5" oninput="updateStyle()">
        </div>

        <div class="control-panel">
            <span class="section-title">4. Upload Images</span>
            <label>School Logo:</label>
            <input type="file" onchange="loadLogo(event, 'school')">
            <label style="margin-top:8px;">Boy Photo:</label>
            <input type="file" onchange="loadLogo(event, 'boy')">
            <label style="margin-top:8px;">Girl Photo:</label>
            <input type="file" onchange="loadLogo(event, 'girl')">
        </div>

        <div class="control-panel">
            <span class="section-title">5. Data Source (Excel)</span>
            <input type="file" id="excel_file" accept=".xlsx, .xls">
            <select id="sheet_list" onchange="changeSheet()" style="margin-top:5px;"></select>
        </div>

        <div class="control-panel">
            <span class="section-title">6. Manual Editing</span>
            <label>School Name:</label>
            <input type="text" id="manual_school" value="ADARSH VIDYA NIKETAN SR. SEC. SCHOOL" oninput="updateCardsLive()">
            <label style="margin-top:8px;">City Name:</label>
            <input type="text" id="manual_city" value="PILANI" oninput="updateCardsLive()">
            <div style="display:flex; gap:10px; margin-top:10px;">
                <div><label>Boy Qty:</label><input type="number" id="qty_boy" value="1" min="0" oninput="updateCardsLive()"></div>
                <div><label>Girl Qty:</label><input type="number" id="qty_girl" value="1" min="0" oninput="updateCardsLive()"></div>
            </div>
            <p style="font-size: 9px; color: #fbbf24; margin-top:5px;">Undo: Ctrl + Z dabayein.</p>
        </div>
    </div>

    <div class="print-container">
        <button class="print-btn" onclick="window.print()">🖨️ PRINT ALL CARDS</button>
    </div>

    <div class="viewport">
        <div class="preview-area" id="page-container">
            <div style="color: #64748b; margin-top: 150px; text-align: center;">
                <h3>Excel File Upload Karein</h3>
            </div>
        </div>
        <div class="excel-view">
            <h3>Sheet Preview</h3>
            <div id="excel_table_container"></div>
        </div>
    </div>

    <script>
        let workbook = null, currentData = [];
        let deletedCardsStack = []; 
        let logos = {
            school: "https://raw.githubusercontent.com/hiteshjangir8057/Adarsh-Pilani-id-Card-Logo/refs/heads/main/Adarsh%20logo.png",
            boy: "https://raw.githubusercontent.com/hiteshjangir8057/Adarsh-Pilani-id-Card-Logo/refs/heads/main/Boy%20Logo.png",
            girl: "https://raw.githubusercontent.com/hiteshjangir8057/Adarsh-Pilani-id-Card-Logo/refs/heads/main/Girl%20Logo.png"
        };

        window.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'z' && deletedCardsStack.length > 0) {
                const id = deletedCardsStack.pop();
                document.getElementById(id).style.display = "block";
            }
        });

        function removeCard(id) {
            const el = document.getElementById(id);
            if(el) { el.style.display = "none"; deletedCardsStack.push(id); }
        }

        function updateStyle() {
            const root = document.documentElement;
            root.style.setProperty('--card-w', document.getElementById('card_w_slider').value + 'mm');
            root.style.setProperty('--card-h', document.getElementById('card_h_slider').value + 'mm');
            root.style.setProperty('--school-font-size', document.getElementById('font_slider').value + 'px');
            root.style.setProperty('--page-margin', document.getElementById('page_margin_slider').value + 'mm');
            root.style.setProperty('--boy-size', document.getElementById('boy_size').value + 'px');
            root.style.setProperty('--boy-top', document.getElementById('boy_top').value + 'px');
            root.style.setProperty('--boy-right', document.getElementById('boy_right').value + 'px');
            root.style.setProperty('--girl-size', document.getElementById('girl_size').value + 'px');
            root.style.setProperty('--girl-top', document.getElementById('girl_top').value + 'px');
            root.style.setProperty('--girl-right', document.getElementById('girl_right').value + 'px');
            updateCardsLive();
        }

        function loadLogo(e, type) {
            const file = e.target.files[0];
            if(file) { logos[type] = URL.createObjectURL(file); updateCardsLive(); }
        }

        document.getElementById('excel_file').addEventListener('change', e => {
            const reader = new FileReader();
            reader.onload = e => {
                const data = new Uint8Array(e.target.result);
                workbook = XLSX.read(data, {type: 'array'});
                const dropdown = document.getElementById('sheet_list');
                dropdown.innerHTML = "";
                workbook.SheetNames.forEach(name => {
                    let opt = document.createElement('option');
                    opt.value = name; opt.innerText = name;
                    dropdown.appendChild(opt);
                });
                changeSheet();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function changeSheet() {
            const name = document.getElementById('sheet_list').value;
            const sheet = workbook.Sheets[name];
            currentData = XLSX.utils.sheet_to_json(sheet, { defval: "" });
            deletedCardsStack = [];
            renderExcelTable(currentData);
            updateCardsLive();
        }

        function renderExcelTable(data) {
            const container = document.getElementById('excel_table_container');
            if(!data.length) return;
            let html = "<table><thead><tr>";
            Object.keys(data[0]).forEach(k => html += `<th>${k}</th>`);
            html += "</tr></thead><tbody>";
            data.forEach(row => {
                html += "<tr>";
                Object.values(row).forEach(v => html += `<td>${v}</td>`);
                html += "</tr>";
            });
            html += "</tbody></table>";
            container.innerHTML = html;
        }

        function updateCardsLive() {
            const container = document.getElementById('page-container');
            const school = document.getElementById('manual_school').value;
            const city = document.getElementById('manual_city').value;
            const defB = parseInt(document.getElementById('qty_boy').value) || 0;
            const defG = parseInt(document.getElementById('qty_girl').value) || 0;

            if (!currentData.length) return;
            container.innerHTML = "";
            let cards = [];

            currentData.forEach((row, rIdx) => {
                const keys = Object.keys(row);
                const bKey = keys.find(k => k.toUpperCase() === "BOY");
                const gKey = keys.find(k => k.toUpperCase() === "GIRL");
                let bQty = (bKey && row[bKey] !== "") ? parseInt(row[bKey]) : defB;
                let gQty = (gKey && row[gKey] !== "") ? parseInt(row[gKey]) : defG;
                let cls = row[keys.find(k => k.toUpperCase() === "CLASS")] || "N/A";
                let sec = row[keys.find(k => k.toUpperCase() === "SECTION")] || "N/A";

                for(let i=0; i<bQty; i++) cards.push(buildHTML(cls, sec, "BOY", school, city, rIdx, i, 'B'));
                for(let i=0; i<gQty; i++) cards.push(buildHTML(cls, sec, "GIRL", school, city, rIdx, i, 'G'));
            });

            for (let i = 0; i < cards.length; i += 8) {
                let page = document.createElement('div');
                page.className = 'a4-page';
                page.innerHTML = cards.slice(i, i + 8).join("");
                container.appendChild(page);
            }
        }

        function buildHTML(cls, sec, type, school, city, rIdx, cIdx, g) {
            const id = `c-${rIdx}-${g}-${cIdx}`;
            return `
                <div class="card" id="${id}">
                    <div class="card-tools"><button class="tool-btn" onclick="removeCard('${id}')">X</button></div>
                    <div class="header">
                        <div class="img-container" onclick="this.classList.toggle('hidden')"><img class="school-logo-img" src="${logos.school}"></div>
                        <div class="header-text"><h1 class="school-name">${school}</h1><h2 class="city-name">${city}</h2></div>
                    </div>
                    <div class="body-content">
                        <div class="pass-badge">STUDENT OUT PASS</div>
                        <div class="details"><div><span class="label">CLASS</span> : ${cls}</div><div><span class="label">SECTION</span> : ${sec}</div></div>
                        <div class="char-container img-container ${type==='BOY'?'boy-box':'girl-box'}" onclick="this.classList.toggle('hidden')"><img src="${type==='BOY'?logos.boy:logos.girl}"></div>
                    </div>
                    <div class="footer"><span>PRINCIPAL</span><span style="color:var(--accent); font-weight:800;">${type}</span></div>
                </div>`;
        }
        updateStyle();
    </script>
</body>
</html>
